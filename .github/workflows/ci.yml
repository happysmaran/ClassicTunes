name: ClassicTunes CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build_and_test:
    runs-on: macos-latest

    env:
      SCHEME_NAME: "ClassicTunes"
      BUILD_TARGET: "-project ClassicTunes.xcodeproj"

    steps:
      # 1. Check out the repository source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1.5. Cache packages
      - name: Cache Swift PM Packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # 2. List available Xcode versions for debugging or choosing specific versions
      - name: Show Available Xcode Versions
        run: ls /Applications/Xcode*

      # 3. Select the correct Xcode version
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      # 4. Resolve Package Dependencies (Swift Package Manager)
      - name: Resolve Swift Package Dependencies
        run: xcodebuild -resolvePackageDependencies $BUILD_TARGET -scheme "$SCHEME_NAME"

      # 5. Build the application for testing
      - name: Build Application
        run: |
          xcodebuild build \
            $BUILD_TARGET \
            -scheme "$SCHEME_NAME" \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO